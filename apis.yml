description: >-
  Brown-Forman Corporation is one of the largest American-owned spirits and wine companies
  in the world, established in 1870 and headquartered in Louisville, Kentucky. The company
  produces, bottles, imports, exports, markets, and sells a wide variety of alcoholic
  beverages under brands including Jack Daniel's, Woodford Reserve, Old Forester, Herradura,
  El Jimador, Slane Irish Whiskey, Benriach, Chambord, Diplomático, and Ford's Gin.
  Brown-Forman is traded on the NYSE under tickers BF.A and BF.B.
